schema_version: 2
product: ack
api_product: CS
resource: kubeconfig
kind: regional
aliases: [kc]
display_name:
  en: kubeconfig
  zh-CN: KubeConfig
description:
  en: Manage ACK kubeconfig credentials
  zh-CN: 管理 ACK KubeConfig 凭证
examples:
  - ecctl ack kubeconfig create --cluster <cluster-id>
  - ecctl ack kc create --cluster <cluster-id> --user-id <ram-user-id>
  - ecctl ack kubeconfig list --cluster <cluster-id>
  - ecctl ack kubeconfig revoke --cluster <cluster-id>

identity:
  field: cluster
  output_root:
    one: kubeconfig
    many: kubeconfigs

schema:
  fields:
    cluster:
      type: string
      description:
        en: ACK cluster ID
        zh-CN: ACK 集群 ID
    user_id:
      type: string
      description:
        en: RAM user or role ID for subaccount kubeconfig issuance or user-scope state queries
        zh-CN: 用于代签发 KubeConfig 或用户维度状态查询的 RAM 用户或角色 ID
    expire_time:
      type: integer
      description:
        en: KubeConfig validity duration; create sends minutes, update sends hours as required by ACK
        zh-CN: KubeConfig 有效期；create 按分钟发送，update 按 ACK 要求按小时发送
    private_ip:
      type: boolean
      description:
        en: return the private endpoint kubeconfig
        zh-CN: 返回内网访问 KubeConfig
    scope:
      type: string
      default: cluster
      description:
        en: state query scope
        zh-CN: 状态查询维度
      enum: [cluster, user]

controls:
  limit:
    type: integer
    default: 50
    max: 50
    description:
      en: maximum kubeconfig states to return
      zh-CN: 最多返回 KubeConfig 状态数量
  page:
    type: integer
    default: 1
    description:
      en: results page to return
      zh-CN: 返回结果页码

probes:
  user_config:
    api: DescribeClusterUserKubeconfig
    request:
      ClusterId: $.cluster
      TemporaryDurationMinutes: $.expire_time
      PrivateIpAddress: $.private_ip
    response:
      item: $
      request_id: $.RequestId
      fields:
        config: $.config
        expiration: $.expiration
  subaccount_user_config:
    api: DescribeSubaccountK8sClusterUserConfig
    request:
      ClusterId: $.cluster
      Uid: $.user_id
      TemporaryDurationMinutes: $.expire_time
      PrivateIpAddress: $.private_ip
    response:
      item: $
      request_id: $.RequestId
      fields:
        config: $.config
        expiration: $.expiration
  cluster_states:
    api: ListClusterKubeconfigStates
    request:
      ClusterId: $.cluster
      pageNumber: $.page
      pageSize: $.limit
    response:
      items: $.states
      total: $.page.total_count
      request_id: $.RequestId
      fields:
        account_id: $.account_id
        account_name: $.account_name
        account_display_name: $.account_display_name
        account_type: $.account_type
        account_state: $.account_state
        cert_expire_time: $.cert_expire_time
        cert_state: $.cert_state
        revokable: $.revokable
        cloud_service_name: $.cloud_service_name
        cloud_service_roles: $.cloud_service_roles
  user_states:
    api: ListUserKubeConfigStates
    request:
      Uid: $.user_id
      page_number: $.page
      page_size: $.limit
    response:
      items: $.states
      total: $.page.total_count
      request_id: $.RequestId
      fields:
        cluster: $.cluster_id
        cluster_name: $.cluster_name
        cluster_state: $.cluster_state
        cert_expire_time: $.cert_expire_time
        cert_state: $.cert_state

bindings:
  update_expire_time:
    api: UpdateK8sClusterUserConfigExpire
    request:
      ClusterId: $.cluster
      body:
        expire_hour: $.expire_time
        user: $.user_id
    request_id_from: $.RequestId
  revoke_current_user:
    api: RevokeK8sClusterKubeConfig
    request:
      ClusterId: $.cluster
    request_id_from: $.RequestId

operations:
  create:
    examples:
      - ecctl ack kubeconfig create --cluster <cluster-id>
    description:
      en: Issue kubeconfig
      zh-CN: 签发 KubeConfig
    input:
      fields:
        - cluster:
            required: true
        - user_id
        - expire_time
        - private_ip
    workflow:
      - probe: user_config
        unless: has(input.user_id)
      - probe: subaccount_user_config
        when: has(input.user_id)
    output:
      fields:
        kubeconfig:
          cluster: $input.cluster
          user_id: $input.user_id
          config: $result.item.config
          expiration: $result.item.expiration
  update:
    examples:
      - ecctl ack kubeconfig update --cluster <cluster-id> --user-id <user-id> --expire-time <expire-time>
    description:
      en: Update kubeconfig expiration
      zh-CN: 更新 KubeConfig 过期时间
    input:
      fields:
        - cluster:
            required: true
        - user_id:
            required: true
        - expire_time:
            required: true
    workflow:
      - binding: update_expire_time
    output:
      fields:
        actions: $result.actions
        kubeconfig:
          cluster: $input.cluster
          user_id: $input.user_id
          expire_time: $input.expire_time
  get:
    aliases: [show, describe]
    description:
      en: Get kubeconfig
      zh-CN: 获取 KubeConfig
    input:
      fields:
        - cluster:
            required: true
        - private_ip
    workflow:
      - probe: user_config
    output:
      fields:
        kubeconfig:
          cluster: $input.cluster
          config: $result.item.config
          expiration: $result.item.expiration
  list:
    examples:
      - ecctl ack kubeconfig list
    description:
      en: List kubeconfig states
      zh-CN: 列出 KubeConfig 状态
    input:
      fields:
        - cluster
        - scope
        - user_id
      controls:
        - page
        - limit
    workflow:
      - probe: cluster_states
        many: true
        unless: input.scope == user
      - probe: user_states
        many: true
        when: input.scope == user
  revoke:
    examples:
      - ecctl ack kubeconfig revoke --cluster <cluster-id>
    description:
      en: Revoke kubeconfig
      zh-CN: 吊销 KubeConfig
    input:
      fields:
        - cluster:
            required: true
    workflow:
      - binding: revoke_current_user
    output:
      fields:
        actions: $result.actions
        revoked: true
        kubeconfig:
          cluster: $input.cluster
