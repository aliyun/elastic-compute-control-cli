schema_version: 2
product: ecs
resource: port-range-list
kind: regional
aliases: [prl]
display_name:
  en: port range list
  zh-CN: 端口列表
description:
  en: Manage ECS port range lists
  zh-CN: 管理 ECS 端口列表
examples:
  - ecctl ecs port-range-list list
  - ecctl ecs port-range-list create --name web-ports --max-entries 20 --entry port-range=80/80,description=http
  - ecctl ecs port-range-list get <port-range-list-id> --with-entries

identity:
  field: id
  prefix: prl-
  output_root:
    one: port_range_list
    many: port_range_lists

schema:
  fields:
    id:
      type: string
      description:
        en: port range list ID
        zh-CN: 端口列表 ID
    ids:
      type: array
      description:
        en: port range list IDs
        zh-CN: 端口列表 ID 列表
      items:
        type: string
    name:
      type: string
      description:
        en: port range list name
        zh-CN: 端口列表名称
    description:
      type: string
      description:
        en: port range list description
        zh-CN: 端口列表描述
    max_entries:
      type: integer
      description:
        en: maximum number of entries allowed in the port range list
        zh-CN: 端口列表允许的最大条目数
    entries:
      type: array
      description:
        en: port ranges to include when creating the list
        zh-CN: 创建端口列表时包含的端口范围条目
      items:
        type: object
        fields:
          port_range:
            type: string
            description:
              en: port range, for example 80/80
              zh-CN: 端口范围，例如 80/80
          description:
            type: string
            description:
              en: port range entry description
              zh-CN: 端口范围条目描述
    entry_changes:
      type: string
      repeatable: true
      description:
        en: port range entry change; prefix with + to add or - to remove
        zh-CN: 端口范围条目变更，使用 + 前缀新增或 - 前缀删除
    resource_group:
      type: string
      description:
        en: resource group ID
        zh-CN: 资源组 ID
    tag:
      type: key_value
      repeatable: true
      description:
        en: tag assignment key=value
        zh-CN: 标签赋值 key=value

controls:
  filter:
    type: key_value
    repeatable: true
    description:
      en: filter expression key=value
      zh-CN: 过滤表达式 key=value
  limit:
    type: integer
    default: 100
    max: 100
    description:
      en: maximum resources to return
      zh-CN: 最多返回资源数量
  next_token:
    type: string
    description:
      en: token for the next result page
      zh-CN: 下一页查询 token
  no_wait:
    type: boolean
    description:
      en: return before port range list readback
      zh-CN: 端口列表回读完成前返回
  timeout:
    type: duration
    default: 300s
    description:
      en: port range list readback timeout
      zh-CN: 端口列表回读超时时间
  with_associations:
    type: boolean
    description:
      en: include associated resources
      zh-CN: 附带关联资源
  with_entries:
    type: boolean
    description:
      en: include port range entries
      zh-CN: 附带端口范围条目
  api_param:
    type: key_value
    repeatable: true
    description:
      en: additional request parameter key=value
      zh-CN: 额外请求参数 key=value

probes:
  list:
    api: DescribePortRangeLists
    request:
      RegionId: $context.region
      PortRangeListId:
        each: $.ids
      PortRangeListName: $.name
      ResourceGroupId: $.resource_group
      Tag: $.tag
      MaxResults: $.limit
      NextToken: $.next_token
    response:
      items: $.PortRangeLists
      next_token: $.NextToken
      request_id: $.RequestId
      id: $.PortRangeListId
      fields:
        id: $.PortRangeListId
        name: $.PortRangeListName
        description: $.Description
        max_entries: $.MaxEntries
        association_count: $.AssociationCount
        resource_group: $.ResourceGroupId
        creation_time: $.CreationTime
        tags: $.Tags
      absent:
        when_empty_for_requested_ids: true
  entries:
    api: DescribePortRangeListEntries
    request:
      RegionId: $context.region
      PortRangeListId: $.id
    response:
      item: $
      request_id: $.RequestId
      fields:
        entries:
          from: $.Entries
          each:
            port_range: $.PortRange
            description: $.Description
  entry_list:
    api: DescribePortRangeListEntries
    request:
      RegionId: $context.region
      PortRangeListId: $.id
    response:
      items: $.Entries
      request_id: $.RequestId
      fields:
        port_range: $.PortRange
        description: $.Description
  associations:
    api: DescribePortRangeListAssociations
    request:
      RegionId: $context.region
      PortRangeListId: $.id
      MaxResults: $.limit
      NextToken: $.next_token
    response:
      item: $
      next_token: $.NextToken
      request_id: $.RequestId
      fields:
        associations:
          from: $.PortRangeListAssociations
          each:
            resource_id: $.ResourceId
            resource_type: $.ResourceType

waiters:
  entries_visible:
    probe: entry_list
    target: matched
    interval: 2s
    timeout: 300s
    match:
      capture: entries
      by: [port_range, description]
  entries_removed:
    probe: entry_list
    target: absent
    interval: 2s
    timeout: 300s
    match:
      capture: removed_entries
      by: [port_range]

bindings:
  create_to_available:
    api: CreatePortRangeList
    idempotency:
      field: ClientToken
      prefix: port-range-list-create
    request:
      RegionId: $context.region
      PortRangeListName: $.name
      Description: $.description
      MaxEntries: $.max_entries
      Entry:
        capture:
          name: entries
          fields:
            port_range: $.port_range
            description: $.description
        each: $.entries
        fields:
          PortRange: $.port_range
          Description: $.description
      ResourceGroupId: $.resource_group
      Tag: $.tag
      ApiParam:
        raw: $.api_param
    require_all:
      - request: PortRangeListName
      - request: MaxEntries
    id_from: $.PortRangeListId
    request_id_from: $.RequestId
  update_attributes:
    api: ModifyPortRangeList
    idempotency:
      field: ClientToken
      prefix: port-range-list-update
    request:
      RegionId: $context.region
      PortRangeListId: $.id
      PortRangeListName: $.name
      Description: $.description
      AddEntry:
        capture:
          name: entries
          fields:
            port_range: $.port_range
            description: $.description
        each: $prefixed_kv_objects($.entry_changes,"+","port_range")
        fields:
          PortRange: $.port_range
          Description: $.description
      RemoveEntry:
        capture:
          name: removed_entries
          fields:
            port_range: $.port_range
        each: $prefixed_kv_objects($.entry_changes,"-","port_range")
        fields:
          PortRange: $.port_range
      ApiParam:
        raw: $.api_param
    require_all:
      - raw: $.id
    require_any:
      - request: PortRangeListName
      - request: Description
      - request: AddEntry
      - request: RemoveEntry
      - raw: $.api_param
    request_id_from: $.RequestId
  delete_to_absent:
    api: DeletePortRangeList
    request:
      RegionId: $context.region
      PortRangeListId: $.id
      ApiParam:
        raw: $.api_param
    require_all:
      - raw: $.id
    request_id_from: $.RequestId

operations:
  create:
    examples:
      - ecctl ecs port-range-list create --name my-name --max-entries <max-entries>
      - ecctl ecs port-range-list create --name my-name --max-entries <max-entries> --tag env=prod
    description:
      en: Create port range list
      zh-CN: 创建端口列表
    input:
      fields:
        - name:
            required: true
        - description
        - max_entries:
            required: true
        - entries
        - resource_group
        - tag
      controls:
        - no_wait
        - timeout
        - api_param
    workflow:
      - binding: create_to_available
      - wait: entries_visible
        ids:
          - $context.id
        unless: input.no_wait || !has(input.entries)
      - probe: list
        ids:
          - $context.id
        as: final
        unless: input.no_wait
      - probe: entries
        ids:
          - $context.id
        merge: true
        unless: input.no_wait
      - emit:
          fields:
            id: $context.id
            name: $input.name
            description: $input.description
            max_entries: $input.max_entries
            resource_group: $input.resource_group
  update:
    examples:
      - ecctl ecs port-range-list update <port-range-list-id>
      - ecctl ecs port-range-list update <port-range-list-id> --name my-name
    description:
      en: Update port range list
      zh-CN: 更新端口列表
    require_any:
      - raw: $.name
      - raw: $.description
      - raw: $.entry_changes
      - raw: $.api_param
    input:
      fields:
        - id:
            required: true
            positional: true
        - name
        - description
        - entry_changes:
            flag_name: entry
      controls:
        - no_wait
        - timeout
        - api_param
    workflow:
      - binding: update_attributes
      - wait: entries_visible
        ids:
          - $input.id
        unless: input.no_wait || !has($prefixed_kv_objects($.entry_changes,"+","port_range"))
      - wait: entries_removed
        ids:
          - $input.id
        unless: input.no_wait || !has($prefixed_kv_objects($.entry_changes,"-","port_range"))
      - probe: list
        ids:
          - $input.id
        unless: input.no_wait
      - probe: entries
        ids:
          - $input.id
        unless: input.no_wait
        merge: true
      - emit:
          fields:
            id: $input.id
            name: $input.name
            description: $input.description
  delete:
    examples:
      - ecctl ecs port-range-list delete <port-range-list-id>
    description:
      en: Delete port range list
      zh-CN: 删除端口列表
    input:
      fields:
        - id:
            required: true
            positional: true
      controls:
        - api_param
    workflow:
      - binding: delete_to_absent
      - emit:
          fields:
            id: $input.id
          deleted: true

  get:
    aliases: [show, describe]
    description:
      en: Get port range list
      zh-CN: 获取端口列表
    input:
      fields:
        - id:
            required: true
            positional: true
      controls:
        - with_associations
        - with_entries
    workflow:
      - probe: list
        ids:
          - $input.id
        not_found: error
      - probe: associations
        ids:
          - $input.id
        when: input.with_associations
        merge: true
      - probe: entries
        ids:
          - $input.id
        when: input.with_entries
        merge: true
  list:
    examples:
      - ecctl ecs port-range-list list
      - ecctl ecs port-range-list list --filter name=<value>
      - ecctl ecs port-range-list list --filter tag.env=prod
    description:
      en: List port range lists
      zh-CN: 列出端口列表
    input:
      fields:
        - ids:
            positional_many: true
      controls:
        - filter
        - limit
        - next_token
    filters:
      id:
        target: ids
      port-range-list:
        target: ids
      port-range-list.id:
        target: ids
      prl:
        target: ids
      prl.id:
        target: ids
      name:
        target: name
      resource-group:
        target: resource_group
      tag.:
        target: tag
        key_prefix: tag.
    workflow:
      - probe: list
        many: true
