# ECS snapshot lifecycle: create -> read-back -> differential -> list -> update
# -> delete. Cross-region copy has its own resource-named case.
#
# Private prerequisite (DESIGN §12.3): a snapshot is taken from a disk, so this
# case first stands up its own private host instance and resolves its system
# disk id, then snapshots that disk. Teardown is reverse: delete snapshot, then
# the host instance. Its type comes from the shared ECS inventory resolver.
#
# Structural matchers (type/prefix/regex/exists) are derived from the spec.
# Concrete business values the spec cannot know are left as TODO(human).
resource: ecs/snapshot
requires_params: [ecs.instance_type]
needs: [vpc, vswitch, security_group, image]

steps:
  # --- private prerequisite: host instance + its system disk ---
  - name: prereq create host instance
    run: >
      ecctl ecs instance create
      --type {{.params.ecs.instance_type}}
      --image {{.stack.image}}
      --sg {{.stack.security_group}}
      --vswitch {{.stack.vswitch}}
      --name {{.run_name}}-snap-host
      --tag ecctl-e2e=1 --tag run-id={{.run_id}}
    at: $.instance
    expect:
      id: { type: string, prefix: i- }
      status: Running
    capture:
      instance_id: id
    teardown: ecctl ecs instance delete {{.instance_id}} --force

  - name: prereq resolve system disk id
    run: ecctl ecs disk list --filter instance={{.instance_id}}
    # "$" in expect is the response root (a map); assert on $.disks instead, and
    # capture with an absolute path ($-prefixed capture keys resolve from root).
    assert:
      - len($.disks) >= 1
    capture:
      disk_id: $.disks[0].id

  # --- snapshot lifecycle ---
  - name: create
    run: >
      ecctl ecs snapshot create
      --disk {{.disk_id}}
      --name {{.run_name}}-snap
      --tag ecctl-e2e=1 --tag run-id={{.run_id}}
      --timeout 30m
    at: $.snapshot
    expect:
      id: { type: string, prefix: s- }
      name: { eq: "{{.run_name}}-snap" }
      disk: { eq: "{{.disk_id}}" }
    capture:
      snapshot_id: id
    teardown: ecctl ecs snapshot delete {{.snapshot_id}} --force

  - name: get (read-back)
    run: ecctl ecs snapshot get {{.snapshot_id}}
    at: $.snapshot
    expect:
      id: { eq: "{{.snapshot_id}}" }
      disk: { eq: "{{.disk_id}}" }
      status: { oneof: [progressing, accomplished] }
      source_disk_type: { eq: system }   # snapshot was taken from the host's system disk (ecctl lowercases it)
    capture:
      hi_status: status

  - name: differential vs raw DescribeSnapshots
    run: ecctl call ecs DescribeSnapshots --SnapshotIds '["{{.snapshot_id}}"]'
    expect:
      $.response.Snapshots.Snapshot[0].SnapshotId: { eq: "{{.snapshot_id}}" }   # call wraps under .response
      $.response.Snapshots.Snapshot[0].Status: { eq: "{{.hi_status}}" }
      $.response.Snapshots.Snapshot[0].SourceDiskId: { eq: "{{.disk_id}}" }

  - name: list (find ours)
    run: ecctl ecs snapshot list --filter disk={{.disk_id}}
    assert:
      - len($.snapshots) >= 0

  - name: update (rename)
    run: ecctl ecs snapshot update {{.snapshot_id}} --name {{.run_name}}-snap-renamed
    at: $.snapshot
    expect:
      id: { eq: "{{.snapshot_id}}" }

  - name: get (read-back after update)
    run: ecctl ecs snapshot get {{.snapshot_id}}
    at: $.snapshot
    expect:
      id: { eq: "{{.snapshot_id}}" }
      name: { eq: "{{.run_name}}-snap-renamed" }
    capture:
      hi_name: name

  - name: delete
    run: ecctl ecs snapshot delete {{.snapshot_id}} --force
    at: $.snapshot
    expect:
      id: { eq: "{{.snapshot_id}}" }
