# VPC full lifecycle. Structural assertions (type/prefix) are derived from the
# spec; concrete-value assertions are left as TODO(human) per DESIGN D2 — fill
# them with read-back / differential checks the spec cannot know.
resource: vpc/vpc
# Self-contained: this case creates and deletes its own VPC, so it consumes
# nothing from the shared stack (no `needs`).

steps:
  - name: create
    run: ecctl vpc create --name {{.run_name}}-case --cidr 10.20.0.0/16 --tag ecctl-e2e=1 --tag run-id={{.run_id}}
    at: $.vpc
    expect:
      id: { type: string, prefix: vpc- }
      cidr: "10.20.0.0/16"
    capture:
      vpc_id: id
    teardown: ecctl vpc delete {{.vpc_id}}

  - name: get (read-back)
    run: ecctl vpc get {{.vpc_id}}
    at: $.vpc
    expect:
      id: { eq: "{{.vpc_id}}" }
      cidr: "10.20.0.0/16"
      status: { oneof: [Available, Pending] }
    capture:
      hi_cidr: cidr

  - name: differential vs raw DescribeVpcs
    run: ecctl call vpc DescribeVpcs --VpcId {{.vpc_id}}
    expect:
      $.response.Vpcs.Vpc[0].CidrBlock: { eq: "{{.hi_cidr}}" }   # call wraps under .response

  - name: update
    run: ecctl vpc update {{.vpc_id}} --name {{.run_name}}-renamed
    at: $.vpc
    expect:
      id: { eq: "{{.vpc_id}}" }

  - name: list (find ours)
    run: ecctl vpc list --filter status=Available
    assert:
      - len($.vpcs) >= 0

  - name: delete
    run: ecctl vpc delete {{.vpc_id}}
    at: $.vpc
    expect:
      id: { eq: "{{.vpc_id}}" }
      $.deleted: { eq: true }
