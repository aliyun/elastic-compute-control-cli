# Node pool lifecycle on the region's shared E2E cluster.
resource: ack/nodepool
requires_params: [ack.version, ack.instance_type, ack.system_disk_category, ack.runtime, ack.runtime_version]
parameter_constraints:
  ecs:
    min_eni_quantity: 2
    min_eni_private_ip_address_quantity: 6
needs: [ack_shared_cluster, ack_test_instance]
timeout: 90m
serial: true

steps:
  - name: get cluster version
    run: ecctl ack get {{.stack.ack_shared_cluster}}
    at: $.cluster
    expect:
      id: { eq: "{{.stack.ack_shared_cluster}}" }
      version: { eq: "{{.params.ack.version}}" }

  - name: create
    run: >
      ecctl ack nodepool create
      --cluster {{.stack.ack_shared_cluster}}
      --name {{.resource_prefix}}-nodepool
      --desired-size 0
      --instance-type {{.params.ack.instance_type}}
      --vswitch {{.stack.vswitch}}
      --runtime {{.params.ack.runtime}}
      --runtime-version {{.params.ack.runtime_version}}
      --system-disk-category {{.params.ack.system_disk_category}}
      --system-disk-size 40
      --timeout 30m
    at: $.nodepool
    expect:
      id: { type: string, min_len: 1 }
    capture:
      nodepool_id: id
    teardown: ecctl ack nodepool delete {{.nodepool_id}} --cluster {{.stack.ack_shared_cluster}} --force --timeout 30m

  - name: get
    run: ecctl ack nodepool get {{.nodepool_id}} --cluster {{.stack.ack_shared_cluster}}
    at: $.nodepool
    expect:
      id: { eq: "{{.nodepool_id}}" }

  - name: list
    run: ecctl ack nodepool list --cluster {{.stack.ack_shared_cluster}}
    assert:
      - len($.nodepools) >= 1

  - name: update
    run: >
      ecctl ack nodepool update {{.nodepool_id}}
      --cluster {{.stack.ack_shared_cluster}}
      --config '{"nodepool_info":{"name":"{{.resource_prefix}}-nodepool-updated"}}'
      --timeout 30m
    at: $.nodepool
    expect:
      id: { eq: "{{.nodepool_id}}" }
      name: { eq: "{{.resource_prefix}}-nodepool-updated" }

  - name: attach
    run: >
      ecctl ack nodepool attach {{.nodepool_id}}
      --cluster {{.stack.ack_shared_cluster}}
      --instance {{.stack.ack_test_instance}}
      --timeout 30m
    at: $.nodepool
    expect:
      id: { eq: "{{.nodepool_id}}" }
    teardown: ecctl ack nodepool detach {{.nodepool_id}} --cluster {{.stack.ack_shared_cluster}} --instance {{.stack.ack_test_instance}} --timeout 30m

  - name: get attached node
    run: ecctl ack node get {{.stack.ack_test_instance}} --cluster {{.stack.ack_shared_cluster}}
    at: $.node
    expect:
      id: { eq: "{{.stack.ack_test_instance}}" }
      node_name: { type: string, min_len: 1 }
    capture:
      attached_node_name: node_name

  - name: repair
    run: >
      ecctl ack nodepool repair {{.nodepool_id}}
      --cluster {{.stack.ack_shared_cluster}}
      --node {{.attached_node_name}}
      --timeout 60m
    at: $.nodepool
    expect:
      id: { eq: "{{.nodepool_id}}" }

  - name: detach
    run: >
      ecctl ack nodepool detach {{.nodepool_id}}
      --cluster {{.stack.ack_shared_cluster}}
      --instance {{.stack.ack_test_instance}}
      --timeout 30m
    at: $.nodepool
    expect:
      id: { eq: "{{.nodepool_id}}" }

  - name: delete
    run: ecctl ack nodepool delete {{.nodepool_id}} --cluster {{.stack.ack_shared_cluster}} --force --timeout 30m
    expect:
      $.deleted: { eq: true }
