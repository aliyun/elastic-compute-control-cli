# KubeConfig lifecycle for the region's dedicated shared E2E cluster.
resource: ack/kubeconfig
needs: [ack_shared_cluster]
serial: true

steps:
  - name: create
    run: ecctl ack kubeconfig create --cluster {{.stack.ack_shared_cluster}} --expire-time 15
    at: $.kubeconfig
    expect:
      cluster: { eq: "{{.stack.ack_shared_cluster}}" }
      config: { type: string, min_len: 1 }
    teardown: ecctl ack kubeconfig revoke --cluster {{.stack.ack_shared_cluster}}

  - name: get
    run: ecctl ack kubeconfig get --cluster {{.stack.ack_shared_cluster}}
    at: $.kubeconfig
    expect:
      cluster: { eq: "{{.stack.ack_shared_cluster}}" }
      config: { type: string, min_len: 1 }

  - name: list
    run: ecctl ack kubeconfig list --cluster {{.stack.ack_shared_cluster}} --limit 10
    assert:
      - len($.kubeconfigs) >= 0

  - name: revoke
    run: ecctl ack kubeconfig revoke --cluster {{.stack.ack_shared_cluster}}
    expect:
      $.revoked: { eq: true }
