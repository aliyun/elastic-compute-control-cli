# UpdateK8sClusterUserConfigExpire is restricted by ACK to the Alibaba Cloud
# account owner. Keep it separate so RAM-user runs still validate the other
# kubeconfig operations without provisioning an unusable shared cluster.
resource: ack/kubeconfig
needs: [ack_shared_cluster, ack_test_user]
requires_prerequisites: [ack.root_account]
serial: true

steps:
  - name: issue user kubeconfig
    run: >
      ecctl ack kubeconfig create
      --cluster {{.stack.ack_shared_cluster}}
      --user-id {{.stack.ack_test_user_id}}
      --expire-time 15
    at: $.kubeconfig
    expect:
      cluster: { eq: "{{.stack.ack_shared_cluster}}" }
      user_id: { eq: "{{.stack.ack_test_user_id}}" }
      config: { type: string, min_len: 1 }
    teardown: ecctl ack permission delete --user-id {{.stack.ack_test_user_id}} --cluster {{.stack.ack_shared_cluster}} --force

  - name: update
    run: >
      ecctl ack kubeconfig update
      --cluster {{.stack.ack_shared_cluster}}
      --user-id {{.stack.ack_test_user_id}}
      --expire-time 1
    expect:
      $.kubeconfig.cluster: { eq: "{{.stack.ack_shared_cluster}}" }
      $.kubeconfig.user_id: { eq: "{{.stack.ack_test_user_id}}" }
