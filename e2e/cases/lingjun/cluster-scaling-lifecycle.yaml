# Lingjun cluster scale-in and scale-out using two reserved node groups.
resource: lingjun/cluster
requires_params: [lingjun.cluster_type, lingjun.hpn_zone]
requires_prerequisites: [lingjun.cluster]
timeout: 2h
serial: true

steps:
  - name: create scaling fixture
    run: >
      ecctl lingjun cluster create
      --name {{.run_name}}-scaling-cluster
      --description "ecctl E2E scaling cluster {{.run_id}}"
      --cluster-type {{.params.lingjun.cluster_type}}
      --hpn-zone {{.params.lingjun.hpn_zone}}
      --node-groups '[{"NodeGroupId":"{{index .prerequisites.lingjun.cluster.node_group_ids 0}}","NodeCount":1},{"NodeGroupId":"{{index .prerequisites.lingjun.cluster.node_group_ids 1}}","NodeCount":1}]'
      --tag ecctl-e2e=1 --tag run-id={{.run_id}}
      --timeout 30m
    at: $.cluster
    expect:
      id: { type: string, min_len: 1 }
      name: { eq: "{{.run_name}}-scaling-cluster" }
      status: { oneof: [running, Running] }
    capture:
      scaling_cluster_id: id
    teardown: ecctl lingjun cluster delete {{.scaling_cluster_id}} --timeout 30m

  - name: get scaling nodes
    run: ecctl lingjun cluster get {{.scaling_cluster_id}} --with-nodes
    at: $.cluster
    expect:
      id: { eq: "{{.scaling_cluster_id}}" }
      nodes: { type: array, min_len: 2 }
    capture:
      shrink_node_id: nodes[0].id
      shrink_node_group_id: nodes[0].node_group

  - name: update shrink
    run: >
      ecctl lingjun cluster update {{.scaling_cluster_id}}
      --shrink '[{"NodeGroupId":"{{.shrink_node_group_id}}","Nodes":[{"NodeId":"{{.shrink_node_id}}"}]}]'
      --timeout 30m
    at: $.cluster
    expect:
      id: { eq: "{{.scaling_cluster_id}}" }

  - name: update extend
    run: >
      ecctl lingjun cluster update {{.scaling_cluster_id}}
      --extend '[{"NodeGroupId":"{{.shrink_node_group_id}}","NodeCount":1}]'
      --timeout 30m
    at: $.cluster
    expect:
      id: { eq: "{{.scaling_cluster_id}}" }

  - name: delete scaling fixture
    run: ecctl lingjun cluster delete {{.scaling_cluster_id}} --timeout 30m
    expect:
      $.deleted: { eq: true }
