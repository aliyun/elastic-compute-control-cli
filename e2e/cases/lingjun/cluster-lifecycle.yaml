# Lingjun cluster lifecycle that does not require pre-existing nodes.
resource: lingjun/cluster
timeout: 2h
serial: true

steps:
  - name: create
    run: >
      ecctl lingjun cluster create
      --name {{.run_name}}-cluster
      --description "ecctl E2E cluster {{.run_id}}"
      --cluster-type Lite
      --tag ecctl-e2e=1 --tag run-id={{.run_id}}
      --timeout 30m
    at: $.cluster
    expect:
      id: { type: string, min_len: 1 }
      name: { eq: "{{.run_name}}-cluster" }
      status: { oneof: [running, Running] }
    capture:
      cluster_id: id
    teardown: ecctl lingjun cluster delete {{.cluster_id}} --timeout 30m

  - name: get
    run: ecctl lingjun cluster get {{.cluster_id}}
    at: $.cluster
    expect:
      id: { eq: "{{.cluster_id}}" }

  - name: list
    run: ecctl lingjun cluster list --filter name={{.run_name}}-cluster --limit 10
    assert:
      - len($.clusters) >= 1

  - name: delete
    run: ecctl lingjun cluster delete {{.cluster_id}} --timeout 30m
    expect:
      $.deleted: { eq: true }
