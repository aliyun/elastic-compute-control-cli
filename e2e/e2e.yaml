# Unified E2E runtime configuration. Region candidates and paths are read from
# here.
version: 2

# Region candidates are tried in order. Region-bound prerequisite resources must
# be declared under the corresponding profile's prerequisites and cannot be
# overridden by environment variables. The repository defaults do not store
# account resource IDs; create e2e.local.yaml from this file when a case needs
# prerequisite resources. The runner tries the next complete region assignment
# only when the current region or zone is confirmed unsupported. Permission,
# quota, assertion, and cleanup failures do not trigger a switch.
regions:
  candidates:
    - id: cn-zhangjiakou
      # Each region supports the prerequisite fields shown below; field allowlist
      # validation is not currently enforced. When needed, copy this file to
      # e2e.local.yaml, uncomment the fields under the matching region, and fill
      # them in:
      # prerequisites:
      #   ecs.image:
      #     oss_bucket: bucket-in-cn-zhangjiakou
      #   ecs.instance_renew:
      #     instance_id: i-prepaid-instance
      #   lingjun.cluster:
      #     # Used only by the Lingjun node inventory and cluster scaling cases:
      #     # two distinct node groups, each with at least one available
      #     # compatible dedicated idle node.
      #     node_group_ids:
      #       - ng-first
      #       - ng-second
    - id: cn-heyuan
    - id: cn-hangzhou

# Paths to E2E files in the repository. Relative paths are resolved from this
# file's directory.
paths:
  cases: cases
  stack: fixtures/stack.yaml
  coverage: coverage.yaml
  parameter_policy: fixtures/parameter-policy.yaml
