name: CI

on:
  push:
    branches:
      - "**"
    tags-ignore:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check release version
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          CI_EVENT: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          version_args=(--check-version-file --version-file version.txt)
          previous_version=$(mktemp)
          released_tags=$(mktemp)
          trap 'rm -f "${previous_version}" "${released_tags}"' EXIT
          git tag --merged HEAD --list 'v*' > "${released_tags}"
          version_args+=(--released-tags-file "${released_tags}")
          if [[ "${CI_EVENT}" == "pull_request" ]] && \
            ! git diff --quiet "${BASE_SHA}" HEAD -- version.txt; then
            if git show "${BASE_SHA}:version.txt" > "${previous_version}" 2>/dev/null; then
              version_args+=(--previous-version-file "${previous_version}")
            else
              latest_tag=$(git describe --tags --abbrev=0 --match 'v*' "${BASE_SHA}" 2>/dev/null || true)
              if [[ -n "${latest_tag}" ]]; then
                printf '%s\n' "${latest_tag#v}" > "${previous_version}"
                version_args+=(--previous-version-file "${previous_version}")
                echo "No version.txt exists on the pull request base; comparing against ${latest_tag}."
              else
                echo "No prior release tag exists; treating this as the version baseline."
              fi
            fi
          fi
          go run ./cmd/releaseprep "${version_args[@]}"

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: E2E offline gates
        run: |
          make -C e2e test
          make -C e2e lint
          e2e/bin/ecctl-e2e coverage registry check \
            --specs specs \
            --cases e2e/cases \
            --registry e2e/coverage.yaml \
            --ecctl-bin e2e/bin/ecctl-public \
            --surface public
          e2e/bin/ecctl-e2e sweep check \
            --cases e2e/cases \
            --config e2e/sweep.yaml

      - name: Snapshot release build
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: v2.17.0
          args: release --snapshot --clean --skip=publish
