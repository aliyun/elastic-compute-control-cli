name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check release repository identity
        env:
          EXPECTED_REPOSITORY: aliyun/ecctl
        shell: bash
        run: |
          if [[ "${GITHUB_REPOSITORY}" != "${EXPECTED_REPOSITORY}" ]]; then
            echo "Public releases must run from ${EXPECTED_REPOSITORY}; current repository is ${GITHUB_REPOSITORY}." >&2
            echo "Complete the public repository transition before pushing a release tag." >&2
            exit 1
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Check public release readiness
        run: make check-public-release

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Publish GitHub release
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger release webhook
        env:
          RELEASE_WEBHOOK_URL: ${{ secrets.RELEASE_WEBHOOK_URL }}
          RELEASE_WEBHOOK_TOKEN: ${{ secrets.RELEASE_WEBHOOK_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ -z "${RELEASE_WEBHOOK_URL}" ]]; then
            echo "RELEASE_WEBHOOK_URL is not set; skipping explicit webhook call."
            exit 0
          fi
          if [[ -z "${RELEASE_WEBHOOK_TOKEN}" ]]; then
            echo "RELEASE_WEBHOOK_TOKEN is not set; cannot sign release webhook payload." >&2
            exit 1
          fi

          release_file=$(mktemp)
          repository_file=$(mktemp)
          payload_file=$(mktemp)
          response_file=$(mktemp)

          gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}" > "${release_file}"
          gh api "repos/${GITHUB_REPOSITORY}" > "${repository_file}"
          jq -n \
            --slurpfile release "${release_file}" \
            --slurpfile repository "${repository_file}" \
            '{action: "edited", release: $release[0], repository: $repository[0]}' \
            > "${payload_file}"

          signature=$(openssl dgst -sha256 -hmac "${RELEASE_WEBHOOK_TOKEN}" "${payload_file}" | awk '{print $2}')
          delivery_id=$(uuidgen | tr '[:upper:]' '[:lower:]')
          task_id="${delivery_id}"

          http_code=$(curl --silent --show-error \
            --output "${response_file}" \
            --write-out "%{http_code}" \
            --retry 3 --retry-delay 5 --connect-timeout 10 --max-time 20 \
            --request POST \
            -H "Content-Type: application/json" \
            -H "User-Agent: GitHub-Hookshot/${GITHUB_RUN_ID}" \
            -H "X-GitHub-Event: release" \
            -H "X-GitHub-Delivery: ${delivery_id}" \
            -H "X-GitHub-Hook-Installation-Target-Type: repository" \
            -H "X-Hub-Signature-256: sha256=${signature}" \
            -H "X-Fc-Invocation-Type: Async" \
            -H "X-Fc-Async-Task-Id: ${task_id}" \
            --data-binary "@${payload_file}" \
            "${RELEASE_WEBHOOK_URL}")

          case "${http_code}" in
            2*)
              echo "Submitted FC async release sync task ${task_id}."
              cat "${response_file}"
              ;;
            409)
              echo "FC async release sync task ${task_id} was already submitted."
              cat "${response_file}"
              ;;
            *)
              echo "Failed to submit FC async release sync task ${task_id}; HTTP ${http_code}." >&2
              cat "${response_file}" >&2
              exit 1
              ;;
          esac
