version: 2

project_name: ecctl

before:
  hooks:
    - go mod download

builds:
  - id: ecctl-darwin
    main: ./cmd/ecctl
    binary: ecctl
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/aliyun/elastic-compute-control-cli/pkg/cli.version={{ .Version }}
        -X github.com/aliyun/elastic-compute-control-cli/pkg/cli.commit={{ .Commit }}
        -X github.com/aliyun/elastic-compute-control-cli/pkg/cli.date={{ .Date }}

  - id: ecctl-other
    main: ./cmd/ecctl
    binary: ecctl
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - >-
        -s -w
        -X github.com/aliyun/elastic-compute-control-cli/pkg/cli.version={{ .Version }}
        -X github.com/aliyun/elastic-compute-control-cli/pkg/cli.commit={{ .Commit }}
        -X github.com/aliyun/elastic-compute-control-cli/pkg/cli.date={{ .Date }}

archives:
  - id: ecctl-darwin
    ids:
      - ecctl-darwin
    formats:
      - tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

  - id: ecctl-other
    ids:
      - ecctl-other
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

homebrew_casks:
  - name: ecctl
    ids:
      - ecctl-darwin
    binaries:
      - ecctl
    repository:
      owner: aliyun
      name: elastic-compute-control-cli
      branch: main
    directory: Casks
    url:
      template: https://ros-public-tools.oss-cn-beijing.aliyuncs.com/github-releases/aliyun/elastic-compute-control-cli/{{ .Version }}/{{ .ArtifactName }}
      verified: ros-public-tools.oss-cn-beijing.aliyuncs.com/github-releases/aliyun/elastic-compute-control-cli/
    homepage: https://github.com/aliyun/elastic-compute-control-cli
    description: Agent-first command-line controller for Alibaba Cloud elastic computing resources
    commit_msg_template: "chore: update Homebrew Cask for {{ .Tag }}"
    # The release workflow publishes this generated Cask only after every OSS
    # artifact has been verified against the immutable GitHub Release.
    skip_upload: true
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/ecctl"]

release:
  # Build into a draft first so every artifact, including the generated Cask,
  # is attached before GitHub locks the immutable release.
  draft: true
  use_existing_draft: true
  replace_existing_artifacts: true
  prerelease: auto
  extra_files:
    - glob: version.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
